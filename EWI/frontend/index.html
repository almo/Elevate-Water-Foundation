<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevate Water Index</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style.css">
</head>

<body x-data x-cloak>

  <template x-if="!$store.auth.initialized">
    <div class="full-screen-center" style="background: var(--color-neutral-50);">
      <div class="spinner"></div>
    </div>
  </template>

  <template x-if="$store.auth.initialized && !$store.auth.user">
    <div class="login-page full-screen-center" 
         style="background: linear-gradient(135deg, var(--color-primary-600), var(--color-neutral-900));">
      
      <div class="card" style="width: 100%; max-width: 400px; text-align: center; padding: var(--space-6);">
        <div style="font-size: 2rem; margin-bottom: var(--space-2);">💧</div>
        <h1 style="margin-bottom: var(--space-1); color: var(--color-neutral-900);">Elevate Water</h1>
        <p style="margin-bottom: var(--space-4); color: var(--color-neutral-600);">Global Water Index Platform</p>

        <template x-if="$store.auth.error">
          <div x-transition class="error-box">
            <div style="display: flex; align-items: center; color: #b91c1c; font-weight: 500; font-size: 0.875rem;">
              <svg style="width: 20px; height: 20px; margin-right: 8px;" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
              </svg>
              <span x-text="$store.auth.error"></span>
            </div>
            <p style="margin-top: 4px; font-size: 0.75rem; color: #991b1b;">
              Contact <span class="font-medium">contact@ewaterf.org</span> for access.
            </p>
          </div>
        </template>

        <button class="btn btn-primary w-full" @click="$store.auth.login()">
          Sign In with Google
        </button>

        <p style="font-size: 0.75rem; margin-top: var(--space-4); color: var(--color-neutral-500);">
          Authorized Personnel Only.
        </p>
      </div>
    </div>
  </template>

  <template x-if="$store.auth.initialized && $store.auth.user">
    <div class="layout-wrapper" x-data="{ sidebarOpen: true }" x-init="window.loadInitialFragment()">

      <nav class="sidebar" :class="{ 'closed': !sidebarOpen }" x-data="sidebarNav()">
        <div class="sidebar-brand">EWI Platform</div>

        <div class="nav-group">
          <a href="/" x-target="content" class="nav-link" :class="{ 'active': isActive('/') }" @click="currentPath = '/'">
            <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span x-text="$store.i18n.t('nav.ew_index')">EW Index</span>
          </a>
          
          <a href="/settings" x-target="content" class="nav-link" :class="{ 'active': isActive('/settings') }" @click="currentPath = '/settings'">
            <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span x-text="$store.i18n.t('nav.settings')">Settings</span>
          </a>
        </div>

        <div class="nav-group sidebar-bottom">
          <button class="nav-link w-full text-left" @click="$store.i18n.setLocale($store.i18n.locale === 'en' ? 'es' : 'en')">
            <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path>
            </svg>
            <span x-text="$store.i18n.locale === 'en' ? 'Cambiar a Español' : 'Switch to English'"></span>
          </button>

          <button @click="$store.auth.logout()" class="nav-link w-full text-left text-error">
            <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"></path>
            </svg>
            <span x-text="$store.i18n.t('nav.logout')">Logout</span>
          </button>
        </div>
      </nav>

      <div class="main-wrapper">
        <header class="top-header">
          <button @click="sidebarOpen = !sidebarOpen" class="menu-toggle" aria-label="Toggle Sidebar">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>

          <div class="user-profile">
            <div class="user-info">
              <div class="user-name" x-text="$store.auth.user?.displayName || 'User'"></div>
              <div class="user-email" x-text="$store.auth.user?.email"></div>
            </div>

            <div class="avatar">
              <template x-if="$store.auth.user?.photoURL">
                <img :src="$store.auth.user.photoURL" alt="Profile">
              </template>
              <template x-if="!$store.auth.user?.photoURL">
                <span class="avatar-placeholder" x-text="$store.auth.user?.email.substring(0,1).toUpperCase()"></span>
              </template>
            </div>
          </div>
        </header>

        <main id="content" class="main-content">
          </main>
      </div>
    </div>
  </template>

  <script type="module" src="main.js"></script>
</body>
</html>
