<main id="content" class="main-content">
    
    <div class="main-container">
        
        <h1 x-text="$store.i18n.t('settings.title')"></h1>
        <p style="margin-bottom: var(--space-4); color: var(--color-neutral-600);">
            View your account preferences and profile details.
        </p>

        <div class="card" style="max-width: 500px;">
            <h2 x-text="$store.i18n.t('settings.profile')"></h2>

            <div style="display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4);">
                <div class="avatar" style="width: 64px; height: 64px; font-size: 1.5rem;">
                    <template x-if="$store.auth.user?.photoURL">
                        <img :src="$store.auth.user.photoURL" alt="Profile">
                    </template>
                    <template x-if="!$store.auth.user?.photoURL">
                        <span class="avatar-placeholder" x-text="$store.auth.user?.email.substring(0,1).toUpperCase()"></span>
                    </template>
                </div>
                <div>
                    <div class="user-name" style="font-size: 1.25rem;" x-text="$store.auth.user?.displayName || 'User'"></div>
                    <div class="user-email" x-text="$store.auth.user?.email"></div>
                </div>
            </div>

            <div>
                <div class="form-group">
                    <label x-text="$store.i18n.t('form.name')"></label>
                    <input type="text" :value="$store.auth.user?.displayName || ''" readonly disabled>
                </div>

                <div class="form-group">
                    <label x-text="$store.i18n.t('form.email')"></label>
                    <input type="email" :value="$store.auth.user?.email || ''" readonly disabled>
                </div>
            </div>
        </div>
    </div>
</main>
