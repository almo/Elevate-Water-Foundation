runtime: java21

instance_class: F1

entrypoint: 'java -jar EWIServer.jar'

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0 # Scaled to zero saves money when idle
  max_instances: 2
  
handlers:
- url: /.*
  script: auto
  secure: always

# Optional: Helps GAE understand when your Ktor app is actually ready
readiness_check:
  path: "/"
  check_interval_sec: 5
  timeout_sec: 4
  failure_threshold: 2
  success_threshold: 2