# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
kotlin-gradle-plugin = "2.3.0"
ktor = "3.4.2"
kotlin = "2.3.0"
appenginePlugin = "2.8.7"
shadow = "8.1.1"
slf4j = "2.0.9"
firebase-admin = "9.2.0"
google-auth = "1.23.0"

[libraries]
kotlin-gradle-plugin = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin-gradle-plugin" }

# Ktor Server Core
ktor-server-core = { module = "io.ktor:ktor-server-core-jvm", version.ref = "ktor" }
ktor-server-netty = { module = "io.ktor:ktor-server-netty-jvm", version.ref = "ktor" }

# Authentication & OAuth
ktor-server-auth = { module = "io.ktor:ktor-server-auth-jvm", version.ref = "ktor" }
ktor-server-auth-jwt = { module = "io.ktor:ktor-server-auth-jwt-jvm", version.ref = "ktor" }

# Content Negotiation (JSON)
ktor-server-content-negotiation = { module = "io.ktor:ktor-server-content-negotiation-jvm", version.ref = "ktor" }
ktor-serialization-kotlinx-json = { module = "io.ktor:ktor-serialization-kotlinx-json-jvm", version.ref = "ktor" }

# Compression
ktor-server-compression = { module = "io.ktor:ktor-server-compression-jvm", version.ref = "ktor" }
ktor-server-compression-zstd = { module = "io.ktor:ktor-server-compression-zstd-jvm", version.ref = "ktor" }


# Logging (Standard for Ktor)
logback-classic = { module = "ch.qos.logback:logback-classic", version = "1.5.6" }

# Ktor Call Logging plugin
ktor-server-call-logging = { module = "io.ktor:ktor-server-call-logging-jvm", version.ref = "ktor" }

# Firebase
firebase-admin = { group = "com.google.firebase", name = "firebase-admin", version.ref = "firebase-admin" }
google-auth-library = { group = "com.google.auth", name = "google-auth-library-oauth2-http", version.ref = "google-auth" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
shadow = { id = "com.github.johnrengelman.shadow", version.ref = "shadow" }
appengine = { id = "com.google.cloud.tools.appengine", version.ref = "appenginePlugin" }